<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký</title>
  </head>
  <body>
    <form action="https://james.codegym.vn/mod/assign/view.php?id=15362" method="post">
      <label for="name"
        ><span> <b>Họ và tên:</b></span></label
      >
      <br />
      <input type="text" name="yourname" id="name" placeholder="Điền vào đi" /> <br /><br />

      <label for="email"
        ><span><b>Email:</b></span></label
      >
      <br />
      <input type="text" name="youremail" id="email" placeholder="Điền vào đi" /> <br /><br />

      <label for="pnb"
        ><span><b>Số điện thoại:</b></span></label
      >
      <br />
      <input type="text" name="yourphonenumber" id="pnb" placeholder="Điền vào đi" /> <br /><br />

      <label for="gender"
        ><span><b>Giới tính:</b></span></label
      >
      <br />
      <input type="radio" name="gender" id="male" value="male" checked /> <label for="male"> Nam </label>
      <input type="radio" name="gender" id="female" value="female" /> <label for="female">Nữ</label> <br /><br />

      <button type="submit" id="button">Đăng ký</button>
    </form>
  </body>
</html>
