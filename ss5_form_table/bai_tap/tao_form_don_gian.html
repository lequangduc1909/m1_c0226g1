<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo Form đơn giản</title>
  </head>
  <body>
    <form action="https://codegym.vn" method="post">
      <label for="yn"><b>Họ và tên:</b></label>
      <br />
      <input type="text" name="yourname" id="yn" /> <br />
      <br />

      <label for="eml"> <b>Email:</b></label> <br />
      <input type="email" name="email" id="eml" /> <br />
      <br />

      <label for="pn"><b>Số điện thoại:</b></label> <br />
      <input type="number" name="phonenumber" id="pn" /><br />

      <input type="radio" name="gender" id="male" value="male" checked />
      <label for="male"><i>Nam </i></label>
      <input type="radio" name="gender" id="female" value="female" />
      <label for="female"><i>Nữ </i></label> <br />
      <br />
      <button type="submit" id="sm"><b>Đăng ký</b></button>
    </form>
  </body>
</html>
