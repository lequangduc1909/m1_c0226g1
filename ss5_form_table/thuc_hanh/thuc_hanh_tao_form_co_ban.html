<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="thuc_hanh_tao_form_co_ban.html" method="post">
      <h2>Order Form</h2>
      <label for="buy"><b>What would you like to buy?</b> <br /></label>
      <select name="liketobuy" id="buy">
        <option value="tshirt">T-Shirt</option>
        <option value="Coat">Coat</option>
        <option value="Jeans">Jeans</option>
        <option value="Shoes">Shoes</option>
      </select>
      <br />
      <br />

      <fieldset style="width: 6.8cm">
        <legend><b>How many would you like to order ?</b></legend>
        <input type="radio" id="one" name="number" value="1" checked />
        <label for="one">1 - $10</label> <br />
        <input type="radio" id="two" name="number" value="2" />
        <label for="two">2 - $20</label> <br />
        <input type="radio" id="three" name="number" value="3" />
        <label for="three"> 3 - $25</label> <br />
        <br />
      </fieldset>

      <label for="1stname"><b>Name:</b> <br /></label>
      <input
        type="text"
        id="1stname"
        name="firstname"
        placeholder="First Name"
      />
      <input type="text" name="lastname" id="lsname" placeholder="Last Name" />
      <br />
      <br />

      <b>Email:</b> <br />
      <input type="text" name="email" id="email" /> <br />
      <br />

      <b>Phone Number:</b> <br />
      <input
        type="tel"
        name="networkcode"
        id="networkcode"
        size="4"
        maxlength="4"
      />
      - <input type="tel" name="midnum" size="4" maxlength="3" /> -
      <input type="tel" name="lastnum" size="4" maxlength="4" /> <br />
      <br />
      <button type="submit" id="sm" name="submit" value="send"><b>Send</b></button>
    </form>
  </body>
</html>
